<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style id="admin-dashboard-styles">
      :root {
        --admin-nav-bg: #FFFFFF;
        --admin-nav-text: #000000;
        --admin-nav-active: #E6F7FF;
        --admin-nav-hover: #f3f4f6;
      }
      
      .admin-sidebar-item {
        transition: background-color 0.2s ease;
      }
      
      .admin-sidebar-item:hover {
        background-color: var(--admin-nav-hover) !important;
      }
      
      .admin-sidebar-item.active {
        background-color: var(--admin-nav-active) !important;
      }
    </style>
    <title>KickDeck</title>
    <style>
      /* Base styles for admin navigation */
      .admin-nav-sidebar .nav-link {
        transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out;
      }
      :root {
        --admin-nav-bg: #FFFFFF;
        --admin-nav-text: #000000;
        --admin-nav-active: #000000; /* This will be updated dynamically */
        --admin-nav-hover: #f3f4f6; /* This will be updated dynamically */
      }
      .admin-nav-sidebar .nav-link {
        background-color: var(--admin-nav-bg);
        color: var(--admin-nav-text);
      }
      .admin-nav-sidebar .nav-link:hover {
        background-color: var(--admin-nav-hover);
      }
      .admin-nav-sidebar .nav-link.active {
        background-color: var(--admin-nav-active);
      }

    </style>
  </head>

    </body>
</html>
